name: CI/CD for Node.js REST-API

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Updated to v4 for better performance

      - name: Login to DockerHub
        uses: docker/login-action@v3 # Using official action is safer than echo | docker login
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: bishal5438/rest-api:latest # Explicitly define the tag here

  Deploy:
    needs: Build # This ensures Deploy ONLY starts if Build finishes successfully
    runs-on: self-hosted
    steps:
      - name: Login to DockerHub (EC2 side)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull the Docker Image
        run: docker pull bishal5438/rest-api:latest 

      - name: Delete Old Container
        run: |
          docker stop rest-api-Container || true
          docker rm rest-api-Container || true

      - name: Run the Container
        run: docker run -d -p 80:80 --name rest-api-Container bishal5438/rest-api:latest
